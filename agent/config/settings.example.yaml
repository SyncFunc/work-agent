# 通用 Agent 配置示例
# 复制为下列之一（只需改路径，内容相同）：
#   项目级：<project>/.agent/settings.yaml   （随项目，优先级更高）
#   用户级：~/.agent/settings.yaml            （跨项目个人偏好，优先级更低）
# 优先级：项目级 YAML > 用户级 YAML；环境变量 LLM_* / .env 可再覆盖；CLI 参数最高。
# 密钥（llm_api_key）建议走环境变量 LLM_API_KEY 或 .env，不要写进会提交的 YAML。

llm:
  # OpenAI 兼容协议的基础地址；换服务商只改这三项，无需改代码
  base_url: https://api.deepseek.com
  model: deepseek-v4-flash
  # api_key: 不建议在此填写（见上方说明）

# 循环控制：单轮对话最大工具迭代次数
max_iterations: 25
